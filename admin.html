<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwamini Ecosystem | Secured Administrative Mainframe</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-workspace { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        .aside-control { background: var(--bg-surface); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .panel-view { padding: 2rem; display: none; }
        .panel-view.active { display: block; }
        .badge-admin { background: var(--danger); color: white; padding: 2px 8px; border-radius: 4px; }
        .badge-operator { background: var(--success); color: white; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="admin-workspace">
        <aside class="aside-control">
            <div class="sidebar-header">
                <h2>MWAMINI CORE</h2>
                <p id="admin-identity">Initializing...</p>
            </div>
            <nav class="sidebar-menu">
                <button class="btn" onclick="switchPanel('dashboard')">Mainframe Analytics</button>
                <button class="btn" onclick="switchPanel('users')">User Registry</button>
            </nav>
        </aside>

        <main id="content-area">
            <section id="dashboard" class="panel-view active">
                <h1>Mainframe Analytics</h1>
                <div class="admin-card"><canvas id="activityChart"></canvas></div>
            </section>
            <section id="users" class="panel-view">
                <h1>User Registry</h1>
                <table>
                    <thead><tr><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        /**
         * ROBUST SECURITY GATEWAY
         * Ensures continuous session validation and Role-Based Access Control.
         */
        async function secureGateway() {
            // 1. Validate Session
            const { data: { user }, error: authError } = await window.Mwamini.supabase.auth.getUser();
            if (authError || !user) return window.location.replace('login.html');

            // 2. Validate Role via Database
            const { data: profile, error: dbError } = await window.Mwamini.supabase
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .single();

            if (dbError || profile?.role !== 'Admin') {
                console.error("Access Forbidden: Insufficient clearance.");
                window.location.replace('dashboard.html');
            } else {
                document.getElementById('admin-identity').innerText = user.email;
                loadAdminData();
            }
        }

        function switchPanel(pid) {
            document.querySelectorAll('.panel-view').forEach(p => p.classList.remove('active'));
            document.getElementById(pid).classList.add('active');
        }

        async function loadAdminData() {
            const { data: users } = await window.Mwamini.supabase.from('profiles').select('*');
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.email}</td>
                    <td><span class="${u.role === 'Admin' ? 'badge-admin' : 'badge-operator'}">${u.role}</span></td>
                    <td><button class="btn" onclick="toggleRole('${u.id}', '${u.role}')">Toggle</button></td>
                </tr>
            `).join('');
        }

        async function toggleRole(id, current) {
            const newRole = current === 'Admin' ? 'Operator' : 'Admin';
            await window.Mwamini.supabase.from('profiles').update({ role: newRole }).eq('id', id);
            loadAdminData();
        }

        window.onload = secureGateway;
    </script>
</body>
</html>
